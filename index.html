<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Fazenda - OIO</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="glass-container">
        <header class="game-header">
            <h1>Minha Fazenda 🌱</h1>
            <div class="status-bar">
                <span id="day-display">Dia 1</span>
                <span id="money-display">Dinheiro: $60</span>
            </div>
        </header>

        <main class="game-board">
            <section class="farm-grid" id="farm-grid">
                </section>

            <section class="action-controls">
                <button class="action-btn" id="btn-plant" data-action="plant">🌱 Plantar</button>
                <button class="action-btn" id="btn-water" data-action="water">💧 Regar</button>
                <button class="action-btn" id="btn-harvest" data-action="harvest">🌾 Colher</button>
                <button class="action-btn primary" id="btn-next-day">⏭ Próximo Dia</button>
            </section>

            <section class="dashboard-panel">
                <div class="store-section">
                    <h2>Loja de Sementes</h2>
                    <div id="store-items" class="store-grid">
                        </div>
                </div>

                <div class="inventory-section">
                    <h2>Mochila</h2>
                    <p id="inventory-display">Vazio</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
